<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>深海求生 Deep Sea Survivor v1.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
'use strict';
// ============================================================
// [CONFIG]
// ============================================================
const W=960,H=640,GAME_DURATION=180,MAX_ENEMIES=80,MAX_PARTICLES=200,XP_ORB_LIFETIME=10,DMG_CD=0.5;

const SUBMARINES=[
{id:'scout',name:'侦察艇',cost:0,dmgMul:1,spdMul:1,pickMul:1,
 colors:['#55bbff','#66ccff','#88ddff','#aaeeff'],
 desc:'均衡型，适合新手'},
{id:'battle',name:'战斗艇',cost:200,dmgMul:1.2,spdMul:0.9,pickMul:1,
 colors:['#ff5555','#ff6644','#ff8833','#ffaa22'],
 desc:'伤害+20% 速度-10%'},
{id:'ghost',name:'幽灵艇',cost:500,dmgMul:1,spdMul:1.2,pickMul:1.3,
 colors:['#aa66ff','#bb77ff','#cc88ff','#ddaaff'],
 desc:'速度+20% 拾取+30%'}
];

const DIFFICULTIES=[
{id:'easy',name:'浅海',nameSub:'Easy',locked:false,
 enemyMul:0.8,spawnMul:1.2,coinMul:0.7,color:'#44cc88'},
{id:'normal',name:'深海',nameSub:'Normal',locked:false,
 enemyMul:1.0,spawnMul:1.0,coinMul:1.0,color:'#4488ff'},
{id:'hard',name:'深渊',nameSub:'Hard',locked:true,
 enemyMul:1.5,spawnMul:0.7,coinMul:1.5,color:'#ff4444'}
];

const ENEMY_TYPES={
jellyfish:{name:'水母',hp:2,speed:40,damage:5,xp:2,radius:10,
 color:'#ff69ff',glow:'rgba(255,105,255,0.3)'},
fangtooth:{name:'尖牙鱼',hp:5,speed:80,damage:10,xp:5,radius:14,
 color:'#ff4444',glow:'rgba(255,68,68,0.3)'},
octopus:{name:'巨型章鱼',hp:15,speed:30,damage:20,xp:12,radius:22,
 color:'#aa44ff',glow:'rgba(170,68,255,0.3)'}
};

const WAVE_CFG=[
{dur:30,types:['jellyfish'],intv:0.7,mul:1.0},
{dur:30,types:['jellyfish','fangtooth'],intv:0.6,mul:1.2},
{dur:30,types:['jellyfish','fangtooth'],intv:0.5,mul:1.4},
{dur:30,types:['jellyfish','fangtooth','octopus'],intv:0.4,mul:1.7},
{dur:30,types:['jellyfish','fangtooth','octopus'],intv:0.35,mul:2.0,octW:0.3},
{dur:30,types:['jellyfish','fangtooth','octopus'],intv:0.25,mul:2.5,octW:0.4}
];

const UPGRADES=[
{id:'torpedo_rate',name:'鱼雷射速+',desc:'攻击间隔-15%',icon:'⚡',max:99},
{id:'torpedo_damage',name:'鱼雷伤害+',desc:'伤害+30%',icon:'💥',max:99},
{id:'torpedo_count',name:'多发鱼雷',desc:'发射数+1',icon:'🔱',max:5},
{id:'armor',name:'护甲强化',desc:'减伤20%',icon:'🛡️',max:3},
{id:'speed',name:'引擎升级',desc:'速度+15%',icon:'🚀',max:99},
{id:'magnet',name:'磁力吸取',desc:'拾取+40%',icon:'🧲',max:99},
{id:'heal',name:'船体修复',desc:'回复30%HP',icon:'💚',max:99},
{id:'sonar',name:'声波脉冲',desc:'环形声波',icon:'🔊',max:1}
];

const EVENTS=[
{name:'深海漩涡',desc:'怪物速度+50%',dur:10,color:'#ff6644',
 apply(g){g.eventEnemySpdMul=1.5},remove(g){g.eventEnemySpdMul=1}},
{name:'生物荧光潮',desc:'经验×2',dur:15,color:'#44ffaa',
 apply(g){g.eventXpMul=2},remove(g){g.eventXpMul=1}},
{name:'海底热泉',desc:'每秒回复2HP',dur:10,color:'#ffaa44',
 apply(g){g.eventHeal=2},remove(g){g.eventHeal=0}},
{name:'静电风暴',desc:'攻速×2',dur:8,color:'#aaaaff',
 apply(g){g.eventAtkMul=2},remove(g){g.eventAtkMul=1}}
];

const P_DEF={maxHp:100,speed:150,colR:16,pickR:60,
 tDmg:3,tIntv:0.6,tCnt:1,tSpd:300,tLife:2,
 armor:0,sonar:false,sonDmg:2,sonR:80,sonIntv:3};

// ============================================================
// [UTILS]
// ============================================================
function dist(a,b){const dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy)}
function norm(dx,dy){const l=Math.sqrt(dx*dx+dy*dy);return l===0?{x:0,y:0}:{x:dx/l,y:dy/l}}
function rr(a,b){return a+Math.random()*(b-a)}
function ri(a,b){return Math.floor(rr(a,b+1))}
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v}
function ccol(a,ar,b,br){return dist(a,b)<ar+br}
function xpReq(lv){return Math.floor(8*Math.pow(1.35,lv-1))}

// ============================================================
// [SAVE] — localStorage 存档
// ============================================================
const SAVE_KEY='dss_save';
let saveData={coins:0,unlocked:['scout'],normalCleared:false,selectedSub:'scout',selectedDiff:'normal'};

function loadSave(){
 try{const s=localStorage.getItem(SAVE_KEY);
 if(s){const d=JSON.parse(s);Object.assign(saveData,d)}}catch(e){}
}
function writeSave(){
 try{localStorage.setItem(SAVE_KEY,JSON.stringify(saveData))}catch(e){}
}
loadSave();

// ============================================================
// [CANVAS + INPUT]
// ============================================================
const canvas=document.getElementById('gc');
canvas.width=W;canvas.height=H;
const ctx=canvas.getContext('2d');

const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;
 if(['Space','Enter','Digit1','Digit2','Digit3','KeyR','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault()});
window.addEventListener('keyup',e=>{keys[e.code]=false});
let mx=0,my=0,mclick=false;
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top});
canvas.addEventListener('click',()=>{mclick=true});

// ============================================================
// [GAME STATE]
// ============================================================
const SC={MENU:0,PLAYING:1,UPGRADE:2,END:3};
let scene=SC.MENU,gt,kills,level,xp,xpNext,victory;
let player,enemies,projs,orbs,particles,bgParts;
let spawnT,dmgCD,torpT,sonT,camera;
let upgOpts,upgStacks,sonVis,lvFlash;
let curSub,curDiff;
// event system
let eventTimer,activeEvent,eventTimeLeft;
// menu state
let menuSubIdx,menuDiffIdx,menuMsg,menuMsgT;
// end screen coins
let endCoins,endCoinAnim;
// tier flash
let tierFlash,prevTier;

function getSubIdx(){return SUBMARINES.findIndex(s=>s.id===saveData.selectedSub)||0}
function getDiffIdx(){return DIFFICULTIES.findIndex(d=>d.id===saveData.selectedDiff);} 

function initMenuState(){
 menuSubIdx=getSubIdx();
 menuDiffIdx=Math.max(0,getDiffIdx());
 menuMsg='';menuMsgT=0;
}
initMenuState();

// ============================================================
// [INIT GAME]
// ============================================================
function initGame(){
 scene=SC.PLAYING;gt=0;kills=0;level=1;xp=0;xpNext=xpReq(1);victory=false;
 curSub=SUBMARINES[menuSubIdx];
 curDiff=DIFFICULTIES[menuDiffIdx];
 saveData.selectedSub=curSub.id;
 saveData.selectedDiff=curDiff.id;
 writeSave();

 const s=curSub;
 player={x:0,y:0,hp:P_DEF.maxHp,maxHp:P_DEF.maxHp,
  speed:P_DEF.speed*s.spdMul,colR:P_DEF.colR,pickR:P_DEF.pickR*s.pickMul,
  angle:0,invT:0,flashT:0,
  tDmg:P_DEF.tDmg*s.dmgMul,tIntv:P_DEF.tIntv,tCnt:P_DEF.tCnt,tSpd:P_DEF.tSpd,tLife:P_DEF.tLife,
  armor:P_DEF.armor,sonar:P_DEF.sonar,
  sonDmg:P_DEF.sonDmg,sonR:P_DEF.sonR,sonIntv:P_DEF.sonIntv};

 enemies=[];projs=[];orbs=[];particles=[];
 spawnT=0;dmgCD=0;torpT=0;sonT=0;
 camera={x:0,y:0};
 upgOpts=[];upgStacks={};sonVis=0;lvFlash=0;
 eventTimer=45;activeEvent=null;eventTimeLeft=0;
 tierFlash=0;prevTier=0;
 // event multipliers on a game-scoped object
 player.eventEnemySpdMul=1;player.eventXpMul=1;player.eventHeal=0;player.eventAtkMul=1;

 bgParts=[];
 for(let i=0;i<30;i++) bgParts.push({x:rr(-W,W),y:rr(-H,H),vx:rr(-5,5),vy:rr(-8,-2),r:rr(1,3),a:rr(0.1,0.4)});
}

// ============================================================
// [CAMERA]
// ============================================================
function updCam(){camera.x=player.x-W/2;camera.y=player.y-H/2}

// ============================================================
// [PLAYER UPDATE]
// ============================================================
function updPlayer(dt){
 let dx=0,dy=0;
 if(keys.KeyW||keys.ArrowUp)dy=-1;
 if(keys.KeyS||keys.ArrowDown)dy=1;
 if(keys.KeyA||keys.ArrowLeft)dx=-1;
 if(keys.KeyD||keys.ArrowRight)dx=1;
 if(dx||dy){const n=norm(dx,dy);player.x+=n.x*player.speed*dt;player.y+=n.y*player.speed*dt;player.angle=Math.atan2(n.y,n.x)}
 if(player.invT>0)player.invT-=dt;
 if(player.flashT>0)player.flashT-=dt;
 // event heal
 if(player.eventHeal>0)player.hp=Math.min(player.maxHp,player.hp+player.eventHeal*dt);
}

// ============================================================
// [PROJECTILES]
// ============================================================
function nearestEnemies(n){
 if(!enemies.length)return[];
 return enemies.slice().sort((a,b)=>dist(player,a)-dist(player,b)).slice(0,n);
}

function updProjs(dt){
 const atkIntv=player.tIntv/player.eventAtkMul;
 torpT-=dt;
 if(torpT<=0&&enemies.length>0){
  torpT=atkIntv;
  const tgts=nearestEnemies(player.tCnt);
  for(const t of tgts){
   const n=norm(t.x-player.x,t.y-player.y);
   projs.push({x:player.x,y:player.y,vx:n.x*player.tSpd,vy:n.y*player.tSpd,dmg:player.tDmg,life:player.tLife});
  }
 }
 for(let i=projs.length-1;i>=0;i--){
  const p=projs[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
  if(p.life<=0){projs.splice(i,1);continue}
  for(let j=enemies.length-1;j>=0;j--){
   const e=enemies[j];
   if(ccol(p,4,e,e.radius)){
    e.hp-=p.dmg;e.flashT=0.1;projs.splice(i,1);
    for(let k=0;k<3;k++)spawnPart(p.x,p.y,'#ffaa00',2);
    if(e.hp<=0)enemyKilled(e,j);
    break;
   }
  }
 }
}

function updSonar(dt){
 if(!player.sonar)return;
 const intv=player.sonIntv/player.eventAtkMul;
 sonT-=dt;
 if(sonT<=0){sonT=intv;sonVis=1.0;
  for(let i=enemies.length-1;i>=0;i--){
   const e=enemies[i];
   if(dist(player,e)<=player.sonR){e.hp-=player.sonDmg;e.flashT=0.1;if(e.hp<=0)enemyKilled(e,i)}
  }
 }
 if(sonVis>0)sonVis-=dt*2;
}

// ============================================================
// [ENEMIES]
// ============================================================
function spawnEnemy(type,waveMul){
 if(enemies.length>=MAX_ENEMIES)return;
 const t=ENEMY_TYPES[type];const dm=curDiff.enemyMul;
 const ang=Math.random()*Math.PI*2,sd=Math.max(W,H)*0.7;
 enemies.push({x:player.x+Math.cos(ang)*sd,y:player.y+Math.sin(ang)*sd,
  hp:Math.ceil(t.hp*waveMul*dm),maxHp:Math.ceil(t.hp*waveMul*dm),
  speed:t.speed,damage:Math.ceil(t.damage*waveMul*dm),
  xp:t.xp,type,radius:t.radius,color:t.color,glow:t.glow,flashT:0});
}

function updEnemies(dt){
 const eSpdMul=player.eventEnemySpdMul;
 for(const e of enemies){
  const n=norm(player.x-e.x,player.y-e.y);
  e.x+=n.x*e.speed*eSpdMul*dt;e.y+=n.y*e.speed*eSpdMul*dt;
  if(e.flashT>0)e.flashT-=dt;
 }
 dmgCD-=dt;
 if(dmgCD<=0){let hit=false;
  for(const e of enemies){
   if(ccol(player,player.colR,e,e.radius)){
    let d=Math.ceil(e.damage*(1-player.armor));player.hp-=d;hit=true;
   }
  }
  if(hit){dmgCD=DMG_CD;player.flashT=0.2;for(let i=0;i<5;i++)spawnPart(player.x,player.y,'#ff3333',3)}
 }
 if(player.hp<=0){player.hp=0;endGame(false)}
}

function enemyKilled(e,idx){
 kills++;
 const xpVal=Math.round(e.xp*player.eventXpMul);
 orbs.push({x:e.x,y:e.y,val:xpVal,life:XP_ORB_LIFETIME,pull:false});
 for(let i=0;i<8;i++)spawnPart(e.x,e.y,e.color,4);
 enemies.splice(idx,1);
}

// ============================================================
// [WAVES]
// ============================================================
function curWave(){let t=0;for(let i=0;i<WAVE_CFG.length;i++){t+=WAVE_CFG[i].dur;if(gt<t)return i}return WAVE_CFG.length-1}

function updSpawn(dt){
 const wi=curWave(),w=WAVE_CFG[wi];
 spawnT-=dt;
 if(spawnT<=0){
  spawnT=w.intv*curDiff.spawnMul;
  let type;
  if(w.octW&&Math.random()<w.octW)type='octopus';
  else type=w.types[ri(0,w.types.length-1)];
  spawnEnemy(type,w.mul);
 }
}

// ============================================================
// [XP ORBS]
// ============================================================
function updOrbs(dt){
 for(let i=orbs.length-1;i>=0;i--){
  const o=orbs[i];o.life-=dt;
  if(o.life<=0){orbs.splice(i,1);continue}
  const d=dist(player,o);
  if(d<player.pickR*2)o.pull=true;
  if(o.pull){const n=norm(player.x-o.x,player.y-o.y);o.x+=n.x*300*dt;o.y+=n.y*300*dt}
  if(d<player.pickR){
   xp+=o.val;orbs.splice(i,1);
   while(xp>=xpNext){xp-=xpNext;level++;xpNext=xpReq(level);triggerLvUp()}
  }
 }
}

// ============================================================
// [UPGRADE SYSTEM]
// ============================================================
function triggerLvUp(){
 lvFlash=1.0;
 // check tier change
 const newTier=getTier();
 if(newTier>prevTier){tierFlash=0.5;prevTier=newTier}

 const avail=UPGRADES.filter(u=>(upgStacks[u.id]||0)<u.max);
 if(!avail.length)return;
 const shuf=avail.slice().sort(()=>Math.random()-0.5);
 upgOpts=shuf.slice(0,Math.min(3,shuf.length));
 scene=SC.UPGRADE;
}

function applyUpg(u){
 upgStacks[u.id]=(upgStacks[u.id]||0)+1;
 switch(u.id){
  case'torpedo_rate':player.tIntv*=0.85;break;
  case'torpedo_damage':player.tDmg*=1.3;break;
  case'torpedo_count':player.tCnt++;break;
  case'armor':player.armor=Math.min(0.6,player.armor+0.2);break;
  case'speed':player.speed*=1.15;break;
  case'magnet':player.pickR*=1.4;break;
  case'heal':player.hp=Math.min(player.maxHp,player.hp+player.maxHp*0.3);break;
  case'sonar':player.sonar=true;break;
 }
 scene=SC.PLAYING;upgOpts=[];
}

function getTier(){if(level>=7)return 3;if(level>=5)return 2;if(level>=3)return 1;return 0}

// ============================================================
// [EVENTS]
// ============================================================
function updEvents(dt){
 eventTimer-=dt;
 if(eventTimer<=0){
  eventTimer=45;
  const ev=EVENTS[ri(0,EVENTS.length-1)];
  if(activeEvent)activeEvent.remove(player);
  activeEvent=ev;eventTimeLeft=ev.dur;
  ev.apply(player);
 }
 if(activeEvent){
  eventTimeLeft-=dt;
  if(eventTimeLeft<=0){activeEvent.remove(player);activeEvent=null;eventTimeLeft=0}
 }
}

// ============================================================
// [PARTICLES]
// ============================================================
function spawnPart(x,y,col,spd){
 if(particles.length>=MAX_PARTICLES)return;
 const a=Math.random()*Math.PI*2,s=rr(spd*10,spd*30);
 particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rr(0.3,0.6),ml:0.6,col,r:rr(1,3)});
}

function updParts(dt){
 for(let i=particles.length-1;i>=0;i--){
  const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.95;p.vy*=0.95;p.life-=dt;
  if(p.life<=0)particles.splice(i,1);
 }
}

function updBg(dt){
 for(const p of bgParts){
  p.x+=p.vx*dt;p.y+=p.vy*dt;
  const sx=p.x-camera.x,sy=p.y-camera.y;
  if(sx<-50)p.x+=W+100;if(sx>W+50)p.x-=W+100;
  if(sy<-50)p.y+=H+100;if(sy>H+50)p.y-=H+100;
 }
}

// ============================================================
// [END GAME]
// ============================================================
function endGame(win){
 victory=win;scene=SC.END;
 // calc coins
 const base=Math.floor(kills*1+gt*0.5+(win?50:0));
 endCoins=Math.floor(base*curDiff.coinMul);
 endCoinAnim=0;
 saveData.coins+=endCoins;
 if(win&&curDiff.id==='normal'){saveData.normalCleared=true}
 writeSave();
}

// ============================================================
// [MAIN UPDATE]
// ============================================================
function update(dt){
 if(scene!==SC.PLAYING)return;
 gt+=dt;
 if(gt>=GAME_DURATION){gt=GAME_DURATION;endGame(true);return}
 updPlayer(dt);updCam();updSpawn(dt);updEnemies(dt);updProjs(dt);updSonar(dt);updOrbs(dt);
 updEvents(dt);updParts(dt);updBg(dt);
 if(lvFlash>0)lvFlash-=dt*3;
 if(tierFlash>0)tierFlash-=dt*2;
}

// ============================================================
// [RENDER — BACKGROUND]
// ============================================================
function drawBg(){
 const g=ctx.createRadialGradient(W/2,H/2,100,W/2,H/2,W*0.7);
 g.addColorStop(0,'#0a1628');g.addColorStop(0.5,'#060e1a');g.addColorStop(1,'#020408');
 ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
 for(const p of bgParts){
  ctx.globalAlpha=p.a;ctx.fillStyle='#4488cc';
  ctx.beginPath();ctx.arc(p.x-camera.x,p.y-camera.y,p.r,0,Math.PI*2);ctx.fill();
 }
 ctx.globalAlpha=1;
}

// ============================================================
// [RENDER — PLAYER (4-tier visuals)]
// ============================================================
function drawPlayer(){
 const sx=player.x-camera.x,sy=player.y-camera.y;
 const tier=getTier();
 const col=curSub.colors[tier];
 const scale=1+tier*0.1; // 1.0, 1.1, 1.2, 1.3

 // light aura
 const lg=ctx.createRadialGradient(sx,sy,10,sx,sy,180+tier*30);
 lg.addColorStop(0,`rgba(100,180,255,${0.12+tier*0.04})`);
 lg.addColorStop(0.5,'rgba(60,120,200,0.05)');lg.addColorStop(1,'rgba(0,0,0,0)');
 ctx.fillStyle=lg;ctx.beginPath();ctx.arc(sx,sy,180+tier*30,0,Math.PI*2);ctx.fill();

 // tier flash
 if(tierFlash>0){
  ctx.fillStyle=`rgba(255,255,255,${tierFlash})`;
  ctx.beginPath();ctx.arc(sx,sy,40*scale,0,Math.PI*2);ctx.fill();
 }

 // sonar pulse visual
 if(sonVis>0){
  ctx.strokeStyle=`rgba(0,200,255,${sonVis*0.6})`;ctx.lineWidth=2;
  const r=player.sonR*(1-sonVis*0.3);
  ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle=`rgba(0,200,255,${sonVis*0.3})`;
  ctx.beginPath();ctx.arc(sx,sy,r*1.3,0,Math.PI*2);ctx.stroke();
 }

 ctx.save();ctx.translate(sx,sy);ctx.rotate(player.angle);
 const fc=player.flashT>0?'#ff4444':col;

 if(tier===0){
  // Tier 1: basic small sub
  ctx.fillStyle=fc;ctx.beginPath();ctx.ellipse(0,0,20*scale,10*scale,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=brighten(col,30);ctx.beginPath();ctx.moveTo(20*scale,0);ctx.lineTo(12*scale,-6*scale);ctx.lineTo(12*scale,6*scale);ctx.closePath();ctx.fill();
  ctx.fillStyle='#aaeeff';ctx.beginPath();ctx.arc(5*scale,0,4*scale,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=darken(col,20);
  ctx.beginPath();ctx.moveTo(-18*scale,0);ctx.lineTo(-14*scale,-8*scale);ctx.lineTo(-10*scale,0);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-18*scale,0);ctx.lineTo(-14*scale,8*scale);ctx.lineTo(-10*scale,0);ctx.closePath();ctx.fill();
 } else if(tier===1){
  // Tier 2: wider + side wings
  ctx.fillStyle=fc;ctx.beginPath();ctx.ellipse(0,0,22*scale,11*scale,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=brighten(col,30);ctx.beginPath();ctx.moveTo(22*scale,0);ctx.lineTo(14*scale,-7*scale);ctx.lineTo(14*scale,7*scale);ctx.closePath();ctx.fill();
  // side wings
  ctx.fillStyle=darken(col,15);
  ctx.beginPath();ctx.moveTo(-5*scale,-11*scale);ctx.lineTo(5*scale,-14*scale);ctx.lineTo(5*scale,-11*scale);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-5*scale,11*scale);ctx.lineTo(5*scale,14*scale);ctx.lineTo(5*scale,11*scale);ctx.closePath();ctx.fill();
  ctx.fillStyle='#bbffee';ctx.beginPath();ctx.arc(6*scale,0,4*scale,0,Math.PI*2);ctx.fill();
  // tail
  ctx.fillStyle=darken(col,25);
  ctx.beginPath();ctx.moveTo(-20*scale,0);ctx.lineTo(-16*scale,-9*scale);ctx.lineTo(-12*scale,0);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-20*scale,0);ctx.lineTo(-16*scale,9*scale);ctx.lineTo(-12*scale,0);ctx.closePath();ctx.fill();
 } else if(tier===2){
  // Tier 3: armored + double tail
  ctx.fillStyle=fc;ctx.beginPath();ctx.ellipse(0,0,24*scale,12*scale,0,0,Math.PI*2);ctx.fill();
  // armor plate on nose
  ctx.fillStyle=brighten(col,40);
  ctx.beginPath();ctx.moveTo(24*scale,0);ctx.lineTo(16*scale,-8*scale);ctx.lineTo(16*scale,8*scale);ctx.closePath();ctx.fill();
  ctx.fillStyle=brighten(col,20);ctx.fillRect(14*scale,-3*scale,4*scale,6*scale); // armor block
  // side wings bigger
  ctx.fillStyle=darken(col,15);
  ctx.beginPath();ctx.moveTo(-8*scale,-12*scale);ctx.lineTo(8*scale,-16*scale);ctx.lineTo(8*scale,-12*scale);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-8*scale,12*scale);ctx.lineTo(8*scale,16*scale);ctx.lineTo(8*scale,12*scale);ctx.closePath();ctx.fill();
  // double window
  ctx.fillStyle='#ccffff';ctx.beginPath();ctx.arc(6*scale,-3*scale,3*scale,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6*scale,3*scale,3*scale,0,Math.PI*2);ctx.fill();
  // double tail
  ctx.fillStyle=darken(col,30);
  ctx.beginPath();ctx.moveTo(-22*scale,-3*scale);ctx.lineTo(-18*scale,-12*scale);ctx.lineTo(-14*scale,-3*scale);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-22*scale,3*scale);ctx.lineTo(-18*scale,12*scale);ctx.lineTo(-14*scale,3*scale);ctx.closePath();ctx.fill();
 } else {
  // Tier 4: NUCLEAR SUBMARINE
  const s=scale;
  // main hull
  ctx.fillStyle=fc;ctx.beginPath();ctx.ellipse(0,0,28*s,13*s,0,0,Math.PI*2);ctx.fill();
  // conning tower
  ctx.fillStyle=brighten(col,20);ctx.fillRect(-4*s,-18*s,10*s,8*s);
  ctx.fillStyle=brighten(col,40);ctx.fillRect(-2*s,-20*s,8*s,3*s);
  // nose
  ctx.fillStyle=brighten(col,30);
  ctx.beginPath();ctx.moveTo(28*s,0);ctx.lineTo(18*s,-9*s);ctx.lineTo(18*s,9*s);ctx.closePath();ctx.fill();
  // missile bays
  ctx.fillStyle=darken(col,10);
  for(let i=-2;i<=2;i++){ctx.fillRect((-2+i*4)*s,-13*s,3*s,2*s)}
  // propeller area
  ctx.fillStyle=darken(col,35);
  ctx.beginPath();ctx.moveTo(-26*s,0);ctx.lineTo(-22*s,-14*s);ctx.lineTo(-18*s,0);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-26*s,0);ctx.lineTo(-22*s,14*s);ctx.lineTo(-18*s,0);ctx.closePath();ctx.fill();
  // propeller spin
  const pa=gt*8;
  ctx.strokeStyle=darken(col,20);ctx.lineWidth=2*s;
  ctx.beginPath();ctx.moveTo(-28*s+Math.cos(pa)*6*s,-0+Math.sin(pa)*6*s);
  ctx.lineTo(-28*s-Math.cos(pa)*6*s,0-Math.sin(pa)*6*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-28*s+Math.cos(pa+1.57)*6*s,Math.sin(pa+1.57)*6*s);
  ctx.lineTo(-28*s-Math.cos(pa+1.57)*6*s,-Math.sin(pa+1.57)*6*s);ctx.stroke();
  // windows
  ctx.fillStyle='#ccffff';
  ctx.beginPath();ctx.arc(10*s,0,4*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(10*s,0,2*s,0,Math.PI*2);ctx.fill();
  // glow halo
  ctx.strokeStyle=`rgba(${hexToRgb(col)},0.3)`;ctx.lineWidth=3;
  ctx.beginPath();ctx.ellipse(0,0,32*s,17*s,0,0,Math.PI*2);ctx.stroke();
 }
 ctx.restore();

 // ghost trail particles
 if(curSub.id==='ghost'&&scene===SC.PLAYING){
  if(Math.random()<0.3)spawnPart(player.x-Math.cos(player.angle)*20,player.y-Math.sin(player.angle)*20,curSub.colors[tier],1);

function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`${r},${g},${b}`}
function brighten(hex,amt){return adjColor(hex,amt)}
function darken(hex,amt){return adjColor(hex,-amt)}
function adjColor(hex,amt){
 let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
 r=clamp(r+amt,0,255);g=clamp(g+amt,0,255);b=clamp(b+amt,0,255);
 return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function drawEnemies(){
 for(const e of enemies){
  const sx=e.x-camera.x,sy=e.y-camera.y;
  if(sx<-50||sx>W+50||sy<-50||sy>H+50)continue;
  ctx.fillStyle=e.glow;ctx.beginPath();ctx.arc(sx,sy,e.radius*1.8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=e.flashT>0?'#fff':e.color;

  if(e.type==='jellyfish'){
   ctx.beginPath();ctx.arc(sx,sy-2,e.radius,Math.PI,0);ctx.fill();
   ctx.strokeStyle=e.flashT>0?'#fff':e.color;ctx.lineWidth=1.5;
   for(let t=-2;t<=2;t++){ctx.beginPath();ctx.moveTo(sx+t*3,sy+2);
    const w=Math.sin(gt*3+t)*3;ctx.quadraticCurveTo(sx+t*3+w,sy+e.radius,sx+t*3,sy+e.radius*1.5);ctx.stroke()}
  }else if(e.type==='fangtooth'){
   const a=Math.atan2(player.y-e.y,player.x-e.x);ctx.save();ctx.translate(sx,sy);ctx.rotate(a);
   ctx.beginPath();ctx.moveTo(e.radius,0);ctx.lineTo(0,-e.radius*0.6);ctx.lineTo(-e.radius*0.8,0);ctx.lineTo(0,e.radius*0.6);ctx.closePath();ctx.fill();
   ctx.fillStyle='#ffff00';ctx.beginPath();ctx.arc(e.radius*0.3,-e.radius*0.15,2,0,Math.PI*2);ctx.fill();
   ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(e.radius*0.7,-2);ctx.lineTo(e.radius+3,0);ctx.lineTo(e.radius*0.7,2);ctx.closePath();ctx.fill();
   ctx.restore();
  }else if(e.type==='octopus'){
   ctx.beginPath();ctx.arc(sx,sy,e.radius*0.6,0,Math.PI*2);ctx.fill();
   ctx.strokeStyle=e.flashT>0?'#fff':e.color;ctx.lineWidth=3;
   for(let t=0;t<8;t++){const a=(t/8)*Math.PI*2+gt*0.5;ctx.beginPath();
    ctx.moveTo(sx+Math.cos(a)*e.radius*0.5,sy+Math.sin(a)*e.radius*0.5);
    const ma=a+Math.sin(gt*2+t)*0.3;
    ctx.quadraticCurveTo(sx+Math.cos(ma)*e.radius*0.9,sy+Math.sin(ma)*e.radius*0.9,
     sx+Math.cos(a+Math.sin(gt+t)*0.4)*e.radius,sy+Math.sin(a+Math.sin(gt+t)*0.4)*e.radius);ctx.stroke()}
   ctx.fillStyle='#ffff44';ctx.beginPath();ctx.arc(sx-5,sy-3,3,0,Math.PI*2);ctx.fill();
   ctx.beginPath();ctx.arc(sx+5,sy-3,3,0,Math.PI*2);ctx.fill();
   ctx.fillStyle='#000';ctx.beginPath();ctx.arc(sx-5,sy-3,1.5,0,Math.PI*2);ctx.fill();
   ctx.beginPath();ctx.arc(sx+5,sy-3,1.5,0,Math.PI*2);ctx.fill();
  }
 }
}

function handleMenuInput(){
 // sub selection arrows (keyboard)
 if(keys.ArrowLeft){keys.ArrowLeft=false;menuSubIdx=(menuSubIdx-1+SUBMARINES.length)%SUBMARINES.length}
 if(keys.ArrowRight){keys.ArrowRight=false;menuSubIdx=(menuSubIdx+1)%SUBMARINES.length}

 if(mclick){
  const sub=SUBMARINES[menuSubIdx];
  const unlocked=saveData.unlocked.includes(sub.id);
  // check arrow clicks
  if(my>220&&my<280){
   if(mx>W/2-160&&mx<W/2-120){menuSubIdx=(menuSubIdx-1+SUBMARINES.length)%SUBMARINES.length;mclick=false;return}
   if(mx>W/2+120&&mx<W/2+160){menuSubIdx=(menuSubIdx+1)%SUBMARINES.length;mclick=false;return}
  }
  // unlock button
  if(!unlocked&&saveData.coins>=sub.cost&&my>278&&my<302&&mx>W/2-60&&mx<W/2+60){
   saveData.coins-=sub.cost;saveData.unlocked.push(sub.id);writeSave();mclick=false;return;
  }
  if(!unlocked&&saveData.coins<sub.cost&&my>278&&my<302){
   menuMsg='金币不足！';menuMsgT=2;mclick=false;return;
  }
  // difficulty click
  for(let i=0;i<DIFFICULTIES.length;i++){
   const bx=W/2-150+i*120,by=340,bw=100,bbh=36;
   if(mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bbh){
    if(DIFFICULTIES[i].id==='hard'&&!saveData.normalCleared){menuMsg='需要先通关「深海」难度';menuMsgT=2}
    else menuDiffIdx=i;
    mclick=false;return;
   }
  }
  // start game on other click
  const subNow=SUBMARINES[menuSubIdx];
  if(!saveData.unlocked.includes(subNow.id)){menuMsg='请先解锁该潜艇';menuMsgT=2;mclick=false;return}
  initGame();mclick=false;return;
 }

 if(keys.Enter||keys.Space){
  keys.Enter=false;keys.Space=false;
  const sub=SUBMARINES[menuSubIdx];
  if(!saveData.unlocked.includes(sub.id)){menuMsg='请先解锁该潜艇';menuMsgT=2;return}
  initGame();
 }
}

 ctx.textAlign='center';

 if(victory){
  ctx.font='bold 42px monospace';ctx.fillStyle='#44ffcc';ctx.fillText('🎉 胜利！ 🎉',W/2,H/2-120);
  ctx.font='18px monospace';ctx.fillStyle='#88ddcc';ctx.fillText('你成功在深海中存活了下来！',W/2,H/2-80);
 }else{
  ctx.font='bold 42px monospace';ctx.fillStyle='#ff4444';ctx.fillText('💀 潜艇损毁 💀',W/2,H/2-120);
  ctx.font='18px monospace';ctx.fillStyle='#cc8888';ctx.fillText('你的潜艇被深海怪物摧毁了...',W/2,H/2-80);
 }

 ctx.font='16px monospace';ctx.fillStyle='#fff';
 ctx.fillText(`存活时间: ${fmtTime(gt)}`,W/2,H/2-30);
 ctx.fillText(`击杀数: ${kills}`,W/2,H/2-2);
 ctx.fillText(`等级: ${level}`,W/2,H/2+26);

 // coins earned
 endCoinAnim=Math.min(endCoinAnim+0.02,1);
 const showCoins=Math.floor(endCoins*endCoinAnim);
 ctx.font='bold 18px monospace';ctx.fillStyle='#ffd700';
 ctx.fillText(`💰 +${showCoins} 金币`,W/2,H/2+64);
 ctx.font='13px monospace';ctx.fillStyle='#aa9944';
 ctx.fillText(`累计: ${saveData.coins} 金币`,W/2,H/2+86);

 const blink=Math.sin(Date.now()/300)>0;
 if(blink){ctx.font='bold 20px monospace';ctx.fillStyle='#44ffcc';
  ctx.fillText('按 R 或 点击 返回菜单',W/2,H/2+130)}
}

// ============================================================
// [MAIN LOOP]
// ============================================================
let lastT=0;
bgParts=[];for(let i=0;i<30;i++)bgParts.push({x:rr(-W/2,W/2),y:rr(-H/2,H/2),vx:rr(-5,5),vy:rr(-8,-2),r:rr(1,3),a:rr(0.1,0.4)});

function loop(ts){
 const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;

 if(scene===SC.MENU){
  handleMenuInput();
  if(menuMsgT>0)menuMsgT-=dt;
  // animate bg
  for(const p of bgParts){p.y+=p.vy*dt;if(p.y<-H/2)p.y=H/2}
  drawMenu();
 }else if(scene===SC.PLAYING){
  update(dt);
  drawBg();drawOrbs();drawEnemies();drawProjs();drawPlayer();drawParts();drawHUD();
 }else if(scene===SC.UPGRADE){
  drawBg();drawOrbs();drawEnemies();drawProjs();drawPlayer();drawParts();drawHUD();
  drawUpgrade();handleUpgradeInput();
 }else if(scene===SC.END){
  drawBg();drawOrbs();drawEnemies();drawProjs();drawPlayer();drawParts();drawHUD();
  drawEnd();
  if(keys.KeyR||mclick){keys.KeyR=false;scene=SC.MENU;initMenuState()}
 }

 mclick=false;
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
